name: Build NetManTrigger
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-headers-git

      - name: Compile
        shell: msys2 {0}
        run: |
          g++ NetManTrigger.cpp -o NetManTrigger.exe \
            -DUNICODE -D_UNICODE \
            -lole32 -loleaut32 -luuid \
            -static-libgcc -static-libstdc++ \
            -s

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: NetManTrigger
          path: NetManTrigger.exe
